spring:
  h2:
    datasource:
      jdbc-url: jdbc:h2:mem:testdb
      driver-class-name: org.h2.Driver
      username: sa
      password:
    console:
      enabled: true
      path: /h2
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
      format_sql: true
  cache:
    cache-names:
      - report-type
    caffeine:
      spec: maximumSize=500, expireAfterAccess=1d




